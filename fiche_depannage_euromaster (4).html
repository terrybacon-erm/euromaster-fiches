<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fiche prise d'appel poids lourd — Euromaster</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f4f3ef;margin:0;padding:2rem 1rem;color:#1a1a18}
    .container{max-width:700px;margin:0 auto}
    .section{background:#fff;border:0.5px solid rgba(0,0,0,.12);border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
    .stitle{font-size:11px;font-weight:500;letter-spacing:.06em;color:#5f5e5a;text-transform:uppercase;margin:0 0 12px}
    .fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    .f{display:flex;flex-direction:column;gap:4px}
    label{font-size:12px;color:#5f5e5a}
    input,select,textarea{font-size:14px;padding:7px 10px;border:0.5px solid rgba(0,0,0,.12);border-radius:8px;background:#f4f3ef;color:#1a1a18;width:100%;outline:none;font-family:inherit}
    input:focus,select:focus,textarea:focus{border-color:rgba(0,0,0,.4)}
    textarea{resize:vertical;min-height:64px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid rgba(0,0,0,.12)}
    .htitle{font-size:16px;font-weight:500;margin:0}
    .hmeta{font-size:12px;color:#5f5e5a}
    .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:8px;background:#faeeda;color:#854f0b}
    .dot{width:7px;height:7px;border-radius:50%;background:#ba7517;display:inline-block}
    .pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px}
    .pb{padding:6px 4px;border:0.5px solid rgba(0,0,0,.12);border-radius:8px;background:#f4f3ef;color:#1a1a18;font-size:12px;font-weight:500;cursor:pointer;text-align:center;font-family:inherit}
    .pb:hover{background:#e8e7e3}
    .pb.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
    .elabel{font-size:11px;color:#5f5e5a;margin:10px 0 5px}
    .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
    .tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:3px 8px;border-radius:8px;background:#f4f3ef;border:0.5px solid rgba(0,0,0,.2);color:#1a1a18}
    .tx{cursor:pointer;font-size:10px;color:#5f5e5a}
    .tx:hover{color:#1a1a18}
    .nopos{font-size:12px;color:#5f5e5a;margin-top:6px}
    .btn-row{display:flex;gap:10px;margin-top:16px}
    .bprim{padding:8px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;background:#1a1a18;color:#fff;border:none}
    .bprim:hover{opacity:.85}
    .bsec{padding:8px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;background:transparent;color:#1a1a18;border:0.5px solid rgba(0,0,0,.3)}
    .bsec:hover{background:#f4f3ef}
    .toast{display:none;align-items:center;gap:8px;background:#1a1a18;color:#fff;font-size:13px;font-weight:500;padding:10px 16px;border-radius:8px;margin-top:14px}
    .toast.show{display:flex}
    .ac-wrap{position:relative}
    .ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;z-index:99;margin-top:2px;max-height:200px;overflow-y:auto}
    .ac-item{padding:8px 12px;font-size:13px;color:#1a1a18;cursor:pointer;border-bottom:0.5px solid rgba(0,0,0,.08)}
    .ac-item:last-child{border-bottom:none}
    .ac-item:hover{background:#f4f3ef}
    @media print{body{background:#fff;padding:0}.btn-row{display:none}}
  </style>
</head>
<body>
<div class="container">

  <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <span class="badge"><span class="dot"></span> En cours de saisie</span>
  </div>

  <div class="section">
    <div class="header">
      <div>
        <p class="htitle">Fiche prise d'appel poids lourd — Euromaster</p>
        <p class="hmeta" id="dt"></p>
      </div>
    </div>
    <div style="margin-top:14px">
      <label style="font-size:12px;color:#5f5e5a">Type d'intervention</label>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <button class="pb" id="ti-dep" onclick="selectTI('Dépannage')">Dépannage</button>
        <button class="pb" id="ti-site" onclick="selectTI('Intervention sur site')">Intervention sur site</button>
        <button class="pb" id="ti-centre" onclick="selectTI('Intervention au centre')">Intervention au centre</button>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="stitle">Client</p>
    <div class="fg">
      <div class="f"><label>Société</label><input type="text" id="societe" placeholder="Nom de la société"/></div>
      <div class="f"><label>Nom donneur d'ordre</label><input type="text" id="ordre-nom" placeholder="Prénom Nom"/></div>
      <div class="f"><label>Téléphone donneur d'ordre</label><input type="tel" id="ordre-tel" placeholder="+33 6 00 00 00 00"/></div>
    </div>
    <div class="fg" style="margin-top:10px">
      <div class="f"><label>Nom du chauffeur</label><input type="text" id="chauffeur-nom" placeholder="Prénom Nom"/></div>
      <div class="f"><label>Téléphone chauffeur</label><input type="tel" id="chauffeur-tel" placeholder="+33 6 00 00 00 00"/></div>
    </div>
  </div>

  <div class="section">
    <p class="stitle">Véhicule</p>
    <div class="fg">
      <div class="f">
        <label>Type</label>
        <select id="type-vehicule">
          <option value="">— Sélectionner —</option>
          <option> Porteur</option>
          <option>Remorque</option>
          <option>Tracteur routier</option>
          <option>Bus / Autocar</option>
          <option>Tracteur agricole</option>
          <option>Autre PL</option>
        </select>
      </div>
      <div class="f"><label>Immatriculation</label><input type="text" id="immat" placeholder="AB-123-CD" style="text-transform:uppercase"/></div>
      <div class="f"><label>Dimension</label><input type="text" id="dimension" placeholder="315/70 R22.5"/></div>
      <div class="f"><label>Marque / Modèle</label><input type="text" id="marque" placeholder="Michelin X Line Energy"/></div>
      <div class="f">
        <label>Raison du dépannage</label>
        <select id="raison">
          <option value="">— Sélectionner —</option>
          <option>Éclatement</option>
          <option>Crevaison</option>
          <option>Crevaison lente</option>
          <option>Pneu décollé de la jante</option>
          <option>Usure anormale</option>
          <option>Coupure / Accroc</option>
          <option>Autre</option>
        </select>
      </div>
    </div>

    <div style="margin-top:14px">
      <label style="font-size:12px;color:#5f5e5a">Positions pneu <span style="font-weight:400;font-size:11px">(sélection multiple)</span></label>
      <div id="pos-buttons" style="margin-top:8px"></div>
      <div class="nopos" id="nopos">Aucune position sélectionnée</div>
      <div class="tags" id="pos-tags"></div>
    </div>
  </div>

  <div class="section">
    <p class="stitle">Lieu d'intervention</p>
    <div class="fg">
      <div class="f" style="grid-column:1/-1">
        <label>Adresse</label>
        <div class="ac-wrap">
          <input type="text" id="adresse" placeholder="Saisir une adresse..." autocomplete="off" oninput="acSearch(this.value)"/>
          <div class="ac-list" id="ac-list" style="display:none"></div>
        </div>
      </div>
      <div class="f"><label>Code postal</label><input type="text" id="cp" placeholder="75000" maxlength="5"/></div>
      <div class="f"><label>Ville</label><input type="text" id="ville" placeholder="Paris"/></div>
    </div>
  </div>

  <div class="section">
    <p class="stitle">Intervention</p>
    <div class="fg">
      <div class="f">
        <label>Centre Euromaster</label>
        <select id="centre">
          <option value="">— Sélectionner —</option>
          <option>Antony</option>
          <option>Coignières</option>
          <option>Le Blanc-Mesnil</option>
          <option>Villeneuve-la-Garenne</option>
          <option>Lagny-sur-Marne</option>
          <option>Coulommiers</option>
          <option>Provins</option>
          <option>Vaux-le-Pénil</option>
          <option>Montereau-Fault-Yonne</option>
          <option>Étampes</option>
        </select>
      </div>
      <div class="f"><label>Technicien</label><input type="text" id="technicien" placeholder="Prénom Nom"/></div>
      <div class="f"><label>ETA</label><input type="time" id="eta"/></div>
    </div>
    <div class="f" style="margin-top:10px">
      <label>Notes</label>
      <textarea id="notes" placeholder="Observations, difficultés d'accès, matériel nécessaire..."></textarea>
    </div>
  </div>

  <div class="btn-row">
    <button class="bprim" onclick="generer()">Générer la fiche</button>
    <button class="bsec" onclick="reinit()">Réinitialiser</button>
  </div>

  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="toast-msg"></span>
  </div>

</div>
<script>
  const now = new Date();
  document.getElementById('dt').textContent =
    now.toLocaleDateString('fr-FR') + ' — ' + now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

  let tiSelected = '';
  function selectTI(val){
    tiSelected = val;
    ['ti-dep','ti-site','ti-centre'].forEach(id=>{
      const b=document.getElementById(id);
      if(b) b.classList.toggle('on', b.textContent===val);
    });
  }

  const positions = [];
  for(let e=1;e<=6;e++){
    const sides = e===1?['G','D']:['GI','GE','DI','DE'];
    sides.forEach(s=>positions.push({code:`${e}${s.toLowerCase()}`,label:`${e}${s}`}));
  }
  positions.push({code:'sec',label:'Sec.'});

  const sel = new Set();

  const fullName = code => {
    if(code==='sec') return 'Roue de secours';
    const n=parseInt(code), s=code.replace(/^\d+/,'');
    const m={g:'Gauche',d:'Droit',gi:'Gauche int.',ge:'Gauche ext.',di:'Droit int.',de:'Droit ext.'};
    return `Ess. ${n} — ${m[s]||s.toUpperCase()}`;
  };

  function renderPositions(){
    const c=document.getElementById('pos-buttons');
    let html='',lastE=0,i=0;
    while(i<positions.length){
      const p=positions[i];
      const on=sel.has(p.code)?' on':'';
      if(p.code==='sec'){
        html+=`<div class="elabel">Secours</div><div class="pos-grid"><button class="pb${on}" onclick="toggleP('${p.code}')">${p.label}</button></div>`;
        i++;
      } else {
        const n=parseInt(p.code);
        if(n!==lastE){
          if(lastE) html+=`</div>`;
          lastE=n;
          html+=`<div class="elabel">Essieu ${n}</div><div class="pos-grid">`;
        }
        html+=`<button class="pb${on}" onclick="toggleP('${p.code}')">${p.label}</button>`;
        i++;
      }
    }
    html+=`</div>`;
    c.innerHTML=html;
  }

  function renderTags(){
    const t=document.getElementById('pos-tags');
    const np=document.getElementById('nopos');
    if(!sel.size){np.style.display='block';t.innerHTML='';return;}
    np.style.display='none';
    t.innerHTML=[...sel].map(c=>`<span class="tag">${fullName(c)}<span class="tx" onclick="toggleP('${c}')">✕</span></span>`).join('');
  }

  function toggleP(code){
    sel.has(code)?sel.delete(code):sel.add(code);
    renderPositions(); renderTags();
  }

  renderPositions(); renderTags();

  let acTimer=null;
  function acSearch(q){
    clearTimeout(acTimer);
    const list=document.getElementById('ac-list');
    if(q.length<3){list.style.display='none';return;}
    acTimer=setTimeout(()=>{
      fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=5`)
        .then(r=>r.json())
        .then(d=>{
          if(!d.features||!d.features.length){list.style.display='none';return;}
          list.innerHTML=d.features.map(f=>{
            const p=f.properties;
            const n=encodeURIComponent(p.name||'');
            const ci=encodeURIComponent(p.city||'');
            const cp=p.postcode||'';
            return `<div class="ac-item" onclick="pickAddr('${n}','${cp}','${ci}')">${p.label}</div>`;
          }).join('');
          list.style.display='block';
        }).catch(()=>{list.style.display='none';});
    },300);
  }

  function pickAddr(name,cp,city){
    document.getElementById('adresse').value=decodeURIComponent(name);
    document.getElementById('cp').value=cp;
    document.getElementById('ville').value=decodeURIComponent(city);
    document.getElementById('ac-list').style.display='none';
  }

  document.addEventListener('click',e=>{
    if(!e.target.closest('.ac-wrap')) document.getElementById('ac-list').style.display='none';
  });

  function get(id){return document.getElementById(id)?.value?.trim()||'—';}

  function slug(s){
    return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'').toLowerCase()||'inconnu';
  }

  function generer(){
    const societe=get('societe');
    const posLabel=sel.size?[...sel].map(fullName).join(', '):'—';
    const ts=new Date();
    const dateStr=ts.toLocaleDateString('fr-FR')+' — '+ts.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const hFile=ts.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}).replace(':','h');

    const fiche=
`=== FICHE DÉPANNAGE PL — EUROMASTER ===
Date/heure appel : ${dateStr}
Type intervention : ${tiSelected||'—'}
CLIENT
Société         : ${societe}
Chauffeur       : ${get('chauffeur-nom')} — ${get('chauffeur-tel')}
Donneur d'ordre : ${get('ordre-nom')} — ${get('ordre-tel')}
VÉHICULE
Type            : ${get('type-vehicule')}
Immatriculation : ${get('immat')}
Positions pneu  : ${posLabel}
Dimension       : ${get('dimension')}
Marque/Modèle   : ${get('marque')}
Raison          : ${get('raison')}
LIEU
Adresse         : ${get('adresse')}
Code postal     : ${get('cp')}
Ville           : ${get('ville')}
INTERVENTION
Centre          : ${get('centre')}
Technicien      : ${get('technicien')}
ETA             : ${get('eta')||'—'}
Notes           : ${get('notes')}
=======================================`;

    const fn=`fiche_${slug(societe)}_${hFile}.txt`;
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([fiche],{type:'text/plain;charset=utf-8'}));
    a.download=fn; a.click();

    document.getElementById('toast-msg').textContent=`Fichier téléchargé : ${fn}`;
    const t=document.getElementById('toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),4000);
  }

  function reinit(){
    ['societe','chauffeur-nom','chauffeur-tel','ordre-nom','ordre-tel','immat','dimension','marque','adresse','cp','ville','technicien','eta','notes']
      .forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
    ['type-vehicule','raison','centre'].forEach(id=>{
      const e=document.getElementById(id);if(e)e.selectedIndex=0;
    });
    tiSelected='';
    ['ti-dep','ti-site','ti-centre'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.remove('on');});
    document.getElementById('toast').classList.remove('show');
    document.getElementById('ac-list').style.display='none';
    sel.clear(); renderPositions(); renderTags();
  }
</script>
</body>
</html>
